prd: codebase-audit-kiss-solid
created: 2026-05-09

tasks:
  - id: T-1
    title: "Fix hard LunaLib import in rep-adjust actions"
    priority: must
    complexity: 2
    depends_on: []
    files:
      - src/starlogue/action/fleet/AdjustFactionRelAction.java
      - src/starlogue/action/fleet/AdjustIndividualRelAction.java
    description: |
      Remove the unguarded `import lunalib.lunaSettings.LunaSettings;` from both
      action files. Route any LunaLib reads through `config/LunaSettingHelper`,
      which already guards class presence with `Class.forName` + try/catch.
    acceptance:
      - Mod loads with LunaLib uninstalled (no `NoClassDefFoundError`).
      - Both actions execute correctly when LunaLib is present.
      - No new try/catch boilerplate in the action classes themselves — go through helper.

  - id: T-2
    title: "Add repLevel null guards uniformly across fleet actions"
    priority: must
    complexity: 2
    depends_on: []
    files:
      - src/starlogue/action/fleet/*.java
    description: |
      Audit every fleet action calling `ctx.repLevel.isAtBest(...)` or
      `ctx.repLevel.isAtWorst(...)`. Apply the existing pattern from the actions
      that already guard correctly: `if (ctx.repLevel == null) return false;`
      in `isAvailable`, and treat null as "neutral" in `execute`.
    acceptance:
      - No fleet action throws NPE when `ctx.repLevel == null`.
      - All ~16 rep-touching actions guard consistently.

  - id: T-3
    title: "Bump build flags to Java 17"
    priority: must
    complexity: 2
    depends_on: []
    files:
      - build.sh
    description: |
      Change `-source 8 -target 8` to `-source 17 -target 17` in `build.sh`.
      Verify `./build.sh` still produces `jars/Starlogue.jar` cleanly. Do not
      introduce new syntax in this task — that comes in subsequent refactors.
    acceptance:
      - `./build.sh` exits 0.
      - `jars/Starlogue.jar` produced.
      - No source-level changes outside `build.sh`.

  - id: T-4
    title: "Apply asFloat coercion in rep-adjust actions"
    priority: should
    complexity: 2
    depends_on: [T-1]
    files:
      - src/starlogue/action/fleet/AdjustFactionRelAction.java
      - src/starlogue/action/fleet/AdjustIndividualRelAction.java
    description: |
      Mirror the `asFloat(Object)` defensive helper used by resource-transfer
      actions. LLMs frequently return numeric parameters as JSON strings;
      rep-adjust actions silently fail today.
    acceptance:
      - String-typed numeric parameters coerce correctly.
      - Existing numeric path unchanged.

  - id: T-5
    title: "Extract LlmDispatcher from StarlogueDialogPlugin"
    priority: should
    complexity: 5
    depends_on: [T-3]
    files:
      - src/starlogue/ui/StarlogueDialogPlugin.java
      - src/starlogue/llm/LlmDispatcher.java (new)
    description: |
      Extract the background-thread LLM dispatch + retry-with-backend-fallback
      logic into a new `LlmDispatcher` class. Owns: the daemon Thread, the
      `AtomicReference<LLMResponse> pending`, the retry chain. Exposes:
      `dispatch(LLMRequest)` and `poll()` returning Optional<LLMResponse>.
      Game-thread polling stays in the dialog plugin.
    acceptance:
      - Dialog plugin no longer constructs Threads directly.
      - LLM dispatch + retry isolated in `LlmDispatcher`.
      - Smoke playtest: open dialog, send message, receive response, retry on backend failure.
      - No regression in conversation flow.

  - id: T-6
    title: "Extract ProviderFactory from StarlogueDialogPlugin"
    priority: should
    complexity: 3
    depends_on: [T-5]
    files:
      - src/starlogue/ui/StarlogueDialogPlugin.java
      - src/starlogue/llm/ProviderFactory.java (new)
    description: |
      Move `createClientForBackend` and the per-provider switch into
      `ProviderFactory.create(LlmBackendConfig)`. Inject factory into
      `LlmDispatcher`. Removes provider knowledge from the dialog plugin.
    acceptance:
      - Dialog plugin contains no `new OpenAIClient()`-style references.
      - All four providers (OpenAI, Anthropic, OpenRouter, Xai) routed through factory.
      - Smoke test: each provider selectable in LunaSettings still works.

  - id: T-7
    title: "Extract FleetContextBuilder shared helper"
    priority: should
    complexity: 3
    depends_on: []
    files:
      - src/starlogue/engine/FleetContextBuilder.java (new)
      - src/starlogue/provider/FleetCaptainPlugin.java
      - src/starlogue/starlords/StarLordPlugin.java
    description: |
      Extract the duplicated fleet-context section (StarLordPlugin.java:37–75
      ↔ FleetCaptainPlugin equivalent) into `engine/FleetContextBuilder`.
      `StarLordPlugin` calls helper, then appends its lord-specific
      additions.
    acceptance:
      - No duplication of fleet stat / officer / cargo summary lines.
      - Both providers produce equivalent context for the shared portion.
      - Lord-specific additions remain in `StarLordPlugin`.

  - id: T-8
    title: "Extract defaultFleetActions() helper"
    priority: should
    complexity: 2
    depends_on: [T-7]
    files:
      - src/starlogue/provider/FleetCaptainPlugin.java
      - src/starlogue/starlords/StarLordPlugin.java
      - src/starlogue/action/fleet/DefaultFleetActions.java (new)
    description: |
      The first 28 entries of `StarLordPlugin.getActions()` duplicate
      `FleetCaptainPlugin.getActions()`. Extract a static
      `DefaultFleetActions.list()` returning the shared list. Both providers
      call it; `StarLordPlugin` appends lord-specific actions.
    acceptance:
      - One source of truth for the default fleet action list.
      - `StarLordPlugin` shows lord actions in addition to the default set.

  - id: T-9
    title: "HttpClient singleton in LLM clients"
    priority: should
    complexity: 2
    depends_on: []
    files:
      - src/starlogue/llm/OpenAIClient.java
      - src/starlogue/llm/AnthropicClient.java
    description: |
      Make `HttpClient` a `private static final` shared instance per client
      class. Auth header stays on `HttpRequest`, never the client. Reduces
      per-turn allocation and warms the connection pool.
    acceptance:
      - `HttpClient` allocated once per JVM lifetime per client class.
      - API keys still rotatable mid-session via per-request auth header.

  - id: T-10
    title: "Wire up StarlogueAPI accessors"
    priority: should
    complexity: 2
    depends_on: []
    files:
      - src/starlogue/api/StarlogueAPI.java
    description: |
      Replace the two `return null;` stubs at lines 144 and 148 with real
      implementations returning the live `MemoryEngine` and
      `FactionProfileRegistry` instances. Document them in the API class
      Javadoc as extension points for contributor plugins.
    acceptance:
      - `getMemoryEngine()` returns the live engine instance.
      - `getFactionProfileRegistry()` returns the live registry.
      - Existing contributor interfaces continue to function unchanged.

  - id: T-11
    title: "Consolidate LunaSettingHelper duplication + extract JsonUtils"
    priority: could
    complexity: 3
    depends_on: [T-5]
    files:
      - src/starlogue/ui/StarlogueDialogPlugin.java
      - src/starlogue/config/LunaSettingHelper.java
      - src/starlogue/llm/JsonUtils.java (new)
      - src/starlogue/llm/OpenAIClient.java
      - src/starlogue/llm/AnthropicClient.java
    description: |
      Two cleanups bundled. (a) Remove the duplicated LunaLib safe-get logic
      from the dialog plugin; route through `LunaSettingHelper`. (b) Extract
      `mapToJson` / `deepToJson` (identical between OpenAIClient and
      AnthropicClient) into a `JsonUtils` package-private helper.
    acceptance:
      - One LunaLib safe-get implementation in the codebase.
      - One JSON serialization helper.

  - id: T-12
    title: "Parameterize PersonalityComposer + handle Nex placeholders"
    priority: could
    complexity: 3
    depends_on: []
    files:
      - src/starlogue/personality/PersonalityComposer.java
      - src/starlogue/compat/nex/NexStarlogueCompat.java
    description: |
      Two cleanups bundled. (a) Parameterize the three near-identical compose
      methods in `PersonalityComposer.java:101-124` — they only differ in
      their "base" string source. (b) Decide on the three Nexerelin placeholder
      action inner classes: implement them with real behaviour OR remove them
      from the registered action list so they don't waste tool slots.
    acceptance:
      - One compose method, parameterized by a base supplier.
      - Nex compat actions either do real work or are unregistered.

  - id: T-13
    title: "UX: API-key preflight + animated-dots progress + lightweight test runner"
    priority: could
    complexity: 4
    depends_on: [T-5]
    files:
      - src/starlogue/ui/StarlogueDialogPlugin.java
      - src/starlogue/config/StarlogueCredentials.java
      - test/starlogue/TestRunner.java (new)
      - build.sh
    description: |
      Three UX-and-tooling improvements bundled. (a) On dialog open, check
      for a usable API key; if none, show a friendly "Configure API key in
      LunaSettings" message instead of failing on first send. (b) While an
      LLM call is pending, show cycling dots ("." → ".." → "...") in the
      dialog text driven by `advance()` time accumulator — no extra threads.
      (c) Add `test/starlogue/TestRunner.java` with a `main` that
      reflectively invokes `testXxx`-named methods on the three existing
      test classes; wire `./build.sh test` to invoke it.
    acceptance:
      - Missing API key surfaces a clear message at dialog open.
      - Player sees cycling dots during LLM calls.
      - `./build.sh test` runs all three test classes and reports pass/fail.
      - All three existing tests pass.
