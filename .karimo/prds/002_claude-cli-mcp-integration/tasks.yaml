  - id: C-12
    title: "Investigate --system-prompt-file override for cost reduction"
    priority: could
    complexity: 2
    depends_on: [C-5]
    files:
      - tools/spikes/system-prompt-override/  # Throwaway test
      - src/starlogue/llm/ClaudeCliClient.java  # If viable, integrate
    description: |
      Spike + optional implementation (added 2026-05-10 from C-0 findings).

      Each `claude -p` call injects ~17k tokens of Claude Code agent system
      prompt + skills metadata as cache_creation overhead. For Pro/Max
      subscribers this still consumes their usage quota.

      Test: pass `--system-prompt-file <starlogue.md>` (or
      `--append-system-prompt`) with a minimal NPC-dialogue persona prompt.
      Run the same echo-tool spike. Verify:
        - Tool calls still work (MCP transport unaffected)
        - cache_creation_input_tokens drops significantly (target: <5k vs 17k)
        - Response quality remains acceptable for Starlogue use case

      If spike PASSES: extend ClaudeCliClient to write a small system-prompt
      file per call from `getSystemPromptPreamble(ctx)` (existing per-provider
      prompt) and pass `--system-prompt-file`. Could yield 3x quota efficiency
      for subscribers.

      If spike FAILS (system prompt breaks MCP or degrades quality): document
      finding; do not integrate.
    acceptance:
      - Spike report appended to research/ with verdict.
      - If integrated: token usage measurably reduced; tool calls + dialog quality unchanged.
      - If not integrated: documented reason in research notes.
